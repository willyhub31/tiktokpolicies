<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Le8Geek Callback</title>
  <meta name="description" content="Registered OAuth callback page for the Le8Geek TikTok Login Kit web integration.">
  <link rel="icon" type="image/svg+xml" href="../assets/le8geek-mark.svg">
  <link rel="stylesheet" href="../assets/site.css">
</head>
<body>
  <div class="shell" style="max-width: 860px;">
    <a class="back-link" href="../">Back to Le8Geek home</a>

    <section class="stack">
      <h1 class="section-title">Le8Geek OAuth callback</h1>
      <p class="section-intro">
        This page is the registered redirect URI used by the Le8Geek web app for TikTok Login Kit.
      </p>

      <div class="grid">
        <article class="card">
          <h2>Authorization code</h2>
          <p id="codeBox"><code>Not found</code></p>
          <a id="copyCodeBtn" class="button primary" href="#">Copy code</a>
        </article>
        <article class="card">
          <h2>State</h2>
          <p id="stateBox"><code>Not provided</code></p>
        </article>
      </div>

      <article class="card" style="margin-top:14px;">
        <h2>Raw callback URL</h2>
        <p id="rawUrlBox" style="word-break: break-all;"><code>-</code></p>
      </article>
    </section>
  </div>

  <script>
    const queryParams = new URLSearchParams(window.location.search);
    const hashString = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : "";
    const hashParams = new URLSearchParams(hashString);

    const code = queryParams.get("code") || hashParams.get("code");
    const state = queryParams.get("state") || hashParams.get("state");
    const err = queryParams.get("error")
      || queryParams.get("error_description")
      || hashParams.get("error")
      || hashParams.get("error_description");

    const codeBox = document.getElementById("codeBox");
    const stateBox = document.getElementById("stateBox");
    const rawUrlBox = document.getElementById("rawUrlBox");
    const copyBtn = document.getElementById("copyCodeBtn");

    rawUrlBox.innerHTML = "<code>" + window.location.href + "</code>";

    if (err) {
      codeBox.innerHTML = "<code>Authorization failed: " + err + "</code>";
      copyBtn.style.pointerEvents = "none";
      copyBtn.style.opacity = "0.5";
    } else if (code) {
      codeBox.innerHTML = "<code>" + code + "</code>";
    } else {
      codeBox.innerHTML = "<code>No code in URL. Start OAuth again.</code>";
      copyBtn.style.pointerEvents = "none";
      copyBtn.style.opacity = "0.5";
    }

    stateBox.innerHTML = "<code>" + (state || "Not provided") + "</code>";

    copyBtn.addEventListener("click", async (event) => {
      event.preventDefault();
      try {
        await navigator.clipboard.writeText(code || "");
        copyBtn.textContent = "Copied";
      } catch (error) {
        copyBtn.textContent = "Copy failed";
      }
    });
  </script>
</body>
</html>
